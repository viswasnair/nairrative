name: E2E Tests

on:
  # Run on pull requests targeting main only — not on direct pushes
  pull_request:
    branches: [main]
  # Allow manual runs — optionally against a deployed URL
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Site URL to test against (leave blank to use local dev server)'
        required: false
        default: ''

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Setup ────────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium --with-deps

      # ── Environment ──────────────────────────────────────────────────────────
      # Write .env.local so Vite can pick up the Supabase keys
      - name: Write .env.local
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env.local
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env.local

      # ── Run tests against local dev server (default) ──────────────────────
      - name: Run E2E tests (local dev server)
        if: ${{ !inputs.base_url }}
        run: npx playwright test
        env:
          CI: true
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # ── Run tests against a deployed URL (manual dispatch only) ──────────
      - name: Run E2E tests (deployed URL)
        if: ${{ inputs.base_url != '' }}
        run: npx playwright test
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ inputs.base_url }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          # Supabase keys still needed for auth tests against deployed site
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # ── Artifacts ────────────────────────────────────────────────────────────
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test result traces / screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
